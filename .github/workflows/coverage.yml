name: Coverage

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - pkg/contracts/**/*
      - foundry.toml
      - .github/workflows/coverage.yml
  pull_request:
    branches:
      - main
      - dev
    paths:
      - pkg/contracts/**/*
      - foundry.toml
      - .github/workflows/coverage.yml

permissions:
  contents: read
jobs:
  coverage:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup swap space
        run: |
          sudo fallocate -l 8G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Cache forge build
        uses: actions/cache@v4
        with:
          path: |
            pkg/contracts/cache
            pkg/contracts/out
          key: forge-coverage-${{ hashFiles('pkg/contracts/src/**/*.sol', 'pkg/contracts/test/**/*.sol', 'foundry.toml', '.gitmodules') }}
          restore-keys: |
            forge-coverage-

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.14.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: pnpm

      - name: Run coverage
        run: pnpm --dir pkg/contracts run coverage

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: pkg/contracts/lcov.info
          fail_ci_if_error: true
