name: Security PoC Tests

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - dev
    paths:
      - pkg/contracts/src/**/*.sol
      - pkg/contracts/test/SecurityPoC.t.sol
      - .github/workflows/security-poc.yml
  pull_request:
    paths:
      - pkg/contracts/src/**/*.sol
      - pkg/contracts/test/SecurityPoC.t.sol
      - .github/workflows/security-poc.yml

permissions:
  contents: read

jobs:
  security-poc:
    name: Security PoC (no-regression)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Run SecurityPoC tests
        run: forge test --match-path 'pkg/contracts/test/SecurityPoC.t.sol' -vvv
