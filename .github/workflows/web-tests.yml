name: Web Tests

on:
  pull_request:
    branches:
      - main
      - dev
    paths:
      - .github/workflows/web-tests.yml
      - apps/web/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
  push:
    branches:
      - main
      - dev
    paths:
      - .github/workflows/web-tests.yml
      - apps/web/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml

permissions:
  contents: read

jobs:
  test:
    name: Lint, Typecheck, and Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        working-directory: apps/web
        run: pnpm lint

      - name: Generate contract bindings
        working-directory: apps/web
        run: pnpm generate

      - name: Typecheck
        working-directory: apps/web
        run: pnpm typecheck

      - name: Unit tests
        working-directory: apps/web
        run: pnpm test:unit
