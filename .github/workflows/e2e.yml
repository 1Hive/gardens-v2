name: E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      preview_url:
        description: "Optional Vercel preview URL to test"
        required: false
        type: string
      pr_head_sha:
        description: "Optional PR head SHA for Vercel lookup"
        required: false
        type: string

concurrency:
  group: e2e-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  e2e:
    name: E2E (playwright + synpress)
    if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.draft }}
    concurrency:
      group: e2e-global
      cancel-in-progress: false
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CI: "true"
      E2E_CI: "true"
      HEADLESS: "false"
      E2E_RPC_URL_CI: ${{ secrets.E2E_RPC_URL_CI || vars.E2E_RPC_URL_CI }}
      E2E_COMMUNITY_ID_CI: ${{ vars.E2E_COMMUNITY_ID_CI || secrets.E2E_COMMUNITY_ID_CI }}
      E2E_CHAIN_ID_CI: ${{ vars.E2E_CHAIN_ID_CI || secrets.E2E_CHAIN_ID_CI }}
      E2E_POOL_TOKEN_ADDRESS_CI: ${{ vars.E2E_POOL_TOKEN_ADDRESS_CI || secrets.E2E_POOL_TOKEN_ADDRESS_CI }}
      E2E_GOVERNANCE_TOKEN_ADDRESS_CI: ${{ vars.E2E_GOVERNANCE_TOKEN_ADDRESS_CI || secrets.E2E_GOVERNANCE_TOKEN_ADDRESS_CI }}
      E2E_SUBGRAPH_URL_CI: ${{ vars.E2E_SUBGRAPH_URL_CI || secrets.E2E_SUBGRAPH_URL_CI }}
      E2E_WALLET_SEED_PHRASE_CI: ${{ secrets.E2E_WALLET_SEED_PHRASE_CI }}
      E2E_MIN_GAS_WEI_CI: ${{ vars.E2E_MIN_GAS_WEI_CI || secrets.E2E_MIN_GAS_WEI_CI || '20000000000000000' }}
      E2E_NATIVE_CURRENCY_SYMBOL_CI: ${{ vars.E2E_NATIVE_CURRENCY_SYMBOL_CI || secrets.E2E_NATIVE_CURRENCY_SYMBOL_CI || 'NATIVE' }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID || secrets.VERCEL_PROJECT_ID }}
      VERCEL_TEAM_ID: ${{ vars.VERCEL_TEAM_ID || secrets.VERCEL_TEAM_ID }}
      PR_HEAD_SHA: ${{ inputs.pr_head_sha || github.event.pull_request.head.sha || github.sha }}

    steps:
      - name: Preflight secrets check
        id: preflight
        shell: bash
        env:
          PREVIEW_URL_OVERRIDE: ${{ inputs.preview_url }}
        run: |
          set -euo pipefail

          missing=0
          for key in \
            E2E_RPC_URL_CI \
            E2E_COMMUNITY_ID_CI \
            E2E_CHAIN_ID_CI \
            E2E_POOL_TOKEN_ADDRESS_CI \
            E2E_GOVERNANCE_TOKEN_ADDRESS_CI \
            E2E_SUBGRAPH_URL_CI \
            E2E_WALLET_SEED_PHRASE_CI; do
            if [ -z "${!key:-}" ]; then
              echo "::warning::Missing required CI configuration: ${key}"
              missing=1
            fi
          done

          if [ -z "${PREVIEW_URL_OVERRIDE:-}" ]; then
            for key in VERCEL_TOKEN VERCEL_PROJECT_ID; do
              if [ -z "${!key:-}" ]; then
                echo "::warning::Missing required CI configuration: ${key}"
                missing=1
              fi
            done
          fi

          if [ "$missing" -eq 1 ]; then
            echo "run_e2e=false" >> "$GITHUB_OUTPUT"
          else
            echo "run_e2e=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.preflight.outputs.run_e2e == 'true'
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup pnpm
        if: steps.preflight.outputs.run_e2e == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node
        if: steps.preflight.outputs.run_e2e == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: pnpm

      - name: Install dependencies
        if: steps.preflight.outputs.run_e2e == 'true'
        run: pnpm install --frozen-lockfile

      - name: Check E2E wallet gas balance
        id: gas_check
        if: steps.preflight.outputs.run_e2e == 'true'
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          node - <<'NODE'
          (async () => {
            const { createPublicClient, formatEther, http } = await import("viem");
            const { mnemonicToAccount } = await import("viem/accounts");

            const rpcUrl = process.env.E2E_RPC_URL_CI;
            const mnemonic = process.env.E2E_WALLET_SEED_PHRASE_CI;
            const chainIdRaw = process.env.E2E_CHAIN_ID_CI;
            const minGasWeiRaw = process.env.E2E_MIN_GAS_WEI_CI;

            if (!rpcUrl || !mnemonic || !chainIdRaw) {
              console.log("::warning::Skipping gas check due to missing RPC URL, chain ID, or wallet seed phrase.");
              process.exit(0);
            }

            const chainId = Number(chainIdRaw);
            const minGasWei = BigInt(minGasWeiRaw);
            const account = mnemonicToAccount(mnemonic.trim());
            const nativeSymbol = process.env.E2E_NATIVE_CURRENCY_SYMBOL_CI?.trim() || "NATIVE";

            const client = createPublicClient({
              chain: {
                id: chainId,
                name: `chain-${chainId}`,
                nativeCurrency: { name: "Native", symbol: nativeSymbol, decimals: 18 },
                rpcUrls: { default: { http: [rpcUrl] } },
              },
              transport: http(rpcUrl),
            });

            const balanceWei = await client.getBalance({ address: account.address });
            const balanceEth = formatEther(balanceWei);
            const minEth = formatEther(minGasWei);

            if (balanceWei < minGasWei) {
              console.log(
                `::warning::Insufficient gas for E2E wallet ${account.address}. Balance=${balanceEth} ${nativeSymbol}, required minimum=${minEth} ${nativeSymbol}.`
              );
              process.exit(1);
            }

            console.log(
              `::notice::Sufficient gas for E2E wallet ${account.address}. Balance=${balanceEth} ${nativeSymbol}, required minimum=${minEth} ${nativeSymbol}.`
            );
          })().catch((error) => {
            console.log(`::warning::Gas check failed with error: ${error instanceof Error ? error.message : String(error)}`);
            process.exit(1);
          });
          NODE

      - name: Install Playwright browser and deps
        if: steps.preflight.outputs.run_e2e == 'true'
        run: pnpm --filter e2e exec playwright install --with-deps chromium

      - name: Wait for Vercel preview deployment
        if: steps.preflight.outputs.run_e2e == 'true'
        id: vercel
        shell: bash
        env:
          PREVIEW_URL_OVERRIDE: ${{ inputs.preview_url }}
        run: |
          set -euo pipefail

          if [ -n "${PREVIEW_URL_OVERRIDE:-}" ]; then
            preview_url="${PREVIEW_URL_OVERRIDE}"
            if [[ ! "${preview_url}" =~ ^https?:// ]]; then
              preview_url="https://${preview_url}"
            fi
            echo "Using manually provided preview URL: ${preview_url}"
            echo "::notice::Using manually provided preview URL ${preview_url}"
            echo "preview_url=${preview_url}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          base_api="https://api.vercel.com/v6/deployments"
          query="?projectId=${VERCEL_PROJECT_ID}&limit=20&meta-githubCommitSha=${PR_HEAD_SHA}"
          if [ -n "${VERCEL_TEAM_ID:-}" ]; then
            query="${query}&teamId=${VERCEL_TEAM_ID}"
          fi

          for i in {1..60}; do
            response="$(curl -fsSL \
              -H "Authorization: Bearer ${VERCEL_TOKEN}" \
              "${base_api}${query}")"

            deployment="$(echo "${response}" | jq -c --arg sha "${PR_HEAD_SHA}" \
              '[.deployments[] | select(.meta.githubCommitSha == $sha)] | sort_by(.createdAt) | last')"

            if [ "${deployment}" = "null" ] || [ -z "${deployment}" ]; then
              echo "No Vercel deployment found yet for ${PR_HEAD_SHA}. Retrying..."
              sleep 10
              continue
            fi

            state="$(echo "${deployment}" | jq -r '.readyState // .state // ""')"
            url="$(echo "${deployment}" | jq -r '.url // ""')"
            branch_alias="$(echo "${deployment}" | jq -r '.meta.branchAlias // ""')"
            error_message="$(echo "${deployment}" | jq -r '.errorMessage // ""')"

            echo "Found deployment state: ${state}"

            if [ "${state}" = "READY" ] && [ -n "${url}" ]; then
              echo "Resolved preview URL: https://${url}"
              echo "::notice::Using Vercel preview URL https://${url}"
              echo "preview_url=https://${url}" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            if [ "${state}" = "CANCELED" ] && [ -n "${branch_alias}" ] && echo "${error_message}" | grep -Eqi 'Ignored Build Step|not affected'; then
              echo "Deployment was skipped by Vercel. Falling back to branch alias: https://${branch_alias}"
              echo "::notice::Using Vercel branch alias https://${branch_alias}"
              echo "preview_url=https://${branch_alias}" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            if [ "${state}" = "ERROR" ] || [ "${state}" = "FAILED" ] || [ "${state}" = "CANCELED" ]; then
              echo "Vercel deployment ended in state ${state}"
              echo "${deployment}"
              exit 1
            fi

            sleep 10
          done

          echo "Timed out waiting for Vercel preview deployment."
          exit 1

      - name: Warm up Vercel preview deployment
        if: steps.preflight.outputs.run_e2e == 'true'
        shell: bash
        env:
          PREVIEW_URL: ${{ steps.vercel.outputs.preview_url }}
        run: |
          set -euo pipefail

          if [ -z "${PREVIEW_URL:-}" ]; then
            echo "Missing PREVIEW_URL output from Vercel step."
            exit 1
          fi

          echo "Warming up preview deployment at: ${PREVIEW_URL}"

          # Give the deployment a short grace period before probing.
          sleep 20

          # Probe for up to 5 minutes to absorb first-hit build/cold-start latency.
          for i in {1..30}; do
            status="$(curl -sS -o /dev/null -w "%{http_code}" \
              --max-time 20 \
              --retry 2 \
              --retry-delay 2 \
              "${PREVIEW_URL}")"

            echo "Warm-up attempt ${i}/30 -> HTTP ${status}"

            if [[ "${status}" =~ ^2[0-9]{2}$ || "${status}" =~ ^3[0-9]{2}$ ]]; then
              echo "Preview is responding (HTTP ${status})."
              exit 0
            fi

            sleep 10
          done

          echo "Preview warm-up timed out without a successful HTTP response."
          exit 1

      - name: Run E2E tests
        if: steps.preflight.outputs.run_e2e == 'true'
        env:
          PLAYWRIGHT_BASE_URL: ${{ steps.vercel.outputs.preview_url }}
        run: xvfb-run -a pnpm --filter e2e run test:ci

      - name: Upload Playwright report
        if: ${{ !cancelled() && steps.preflight.outputs.run_e2e == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: pkg/e2e/playwright-report
          retention-days: 14

      - name: Upload Playwright failure artifacts
        if: ${{ failure() && steps.preflight.outputs.run_e2e == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-failure-artifacts
          path: pkg/e2e/test-results
          if-no-files-found: ignore
          retention-days: 14

      - name: Fail workflow on insufficient gas
        if: ${{ always() && steps.preflight.outputs.run_e2e == 'true' && steps.gas_check.outcome == 'failure' }}
        run: |
          echo "::error::E2E wallet gas check failed. Tests were allowed to run, but this workflow is marked as failed."
          exit 1

      - name: Skip E2E (missing secrets)
        if: steps.preflight.outputs.run_e2e != 'true'
        run: echo "Skipping E2E because required CI env vars/secrets are missing."
