coverage:
  status:
    project:
      default:
        target: auto        # compare against base branch
        threshold: 0.2      # allow up to 0.2 percentage point drop
        informational: false
    patch:
      default:
        target: auto
        threshold: 4.0
        informational: false

ignore:
  - "pkg/contracts/script/**"
  - "pkg/contracts/test/**"
