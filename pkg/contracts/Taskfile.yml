          --chain-id 11155111 \
          -vv
  verify-diamond-facets-ethsep:
    desc: Verify live diamond facets on ethsepolia
    cmds:
      - cmd: |
          ./scripts/verify-diamond-facets.sh \
          --network ethsepolia \
          --rpc-url ${RPC_URL_SEP_TESTNET} \
