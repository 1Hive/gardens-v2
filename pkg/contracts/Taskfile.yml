          failed=0

          for network in ethereum arbitrum optimism polygon gnosis base celo; do
            if DEPLOY_IMPLEMENTATION_ONLY=true task "upgrade-proxy-owner-${network}"; then
              echo "✅ ${network}: success"
            else
              echo "❌ ${network}: failed"
              failed=1
            fi
          done

          if [ "$failed" -ne 0 ]; then
            echo "One or more networks failed."
            exit 1
          else
            echo "All networks succeeded."
          fi
