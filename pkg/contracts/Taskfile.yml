  renounce-proxy-owner-upgrade-access-mainnets:
    desc: Renounce ProxyOwner upgrade access on all mainnets
    cmds:
      - cmd: |
          set -euo pipefail

          for network in ethereum arbitrum optimism polygon gnosis base celo; do
            case "$network" in
              ethereum)
                rpc="${RPC_URL_ETHEREUM}"
                task_name="renounce-proxy-owner-upgrade-access-mainnet"
                ;;
              arbitrum)
                rpc="${RPC_URL_ARB}"
                task_name="renounce-proxy-owner-upgrade-access-arbitrum"
                ;;
              optimism)
                rpc="${RPC_URL_OPT}"
                task_name="renounce-proxy-owner-upgrade-access-optimism"
                ;;
              polygon)
                rpc="${RPC_URL_POLYGON}"
                task_name="renounce-proxy-owner-upgrade-access-polygon"
                ;;
              gnosis)
                rpc="${RPC_URL_GNOSIS}"
                task_name="renounce-proxy-owner-upgrade-access-gnosis"
                ;;
              base)
                rpc="${RPC_URL_BASE}"
                task_name="renounce-proxy-owner-upgrade-access-base"
                ;;
              celo)
                rpc="${RPC_URL_CELO}"
                task_name="renounce-proxy-owner-upgrade-access-celo"
                ;;
            esac

            proxy_owner="$(jq -r --arg n "$network" '.networks[] | select(.name == $n) | .ENVS.PROXY_OWNER // empty' config/networks.json)"
            if [ -z "$proxy_owner" ]; then
              echo "[SKIP] ${network}: missing PROXY_OWNER in config"
              continue
            fi

            current_upgrade_access="$(cast call --rpc-url "$rpc" "$proxy_owner" "upgradeAccess()(address)" 2>/dev/null || true)"
            if [ "$current_upgrade_access" = "0x0000000000000000000000000000000000000000" ]; then
              echo "[SKIP] ${network}: ProxyOwner upgradeAccess already renounced"
              continue
            fi

            echo "Renouncing ProxyOwner upgrade access on ${network}"
            task "$task_name"
          done
