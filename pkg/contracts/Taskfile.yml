  upgrade-ethsep:
    desc: Upgrade ethsep
    deps:
      - verify-storage
      - task: refresh-facets-ethsep
    cmds:
      - cmd: |
          forge script script/UpgradeCVMultichainTest.s.sol:UpgradeCVMultichainTest \
          --rpc-url ${RPC_URL_SEP_TESTNET} \
          --sig "run(string)" 'ethsepolia' \
          --private-key ${PRIVATE_KEY} \
          --etherscan-api-key ${ETHERSCAN_API_KEY} \
          --chain-id 11155111 \
          --ffi \
          --broadcast \
          --verify \
          -vvv
      - task: verify-diamond-facets-ethsep
  upgrade-ethsep-factory-upgrade-impl:
    desc: Upgrade ethsep factory implementation only
    deps:
