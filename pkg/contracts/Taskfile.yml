  pause-all-networks-with-pause-controller:
    desc: Pause factory, communities and strategies on every network with ENVS.PAUSE_CONTROLLER set
    cmds:
      - cmd: |
          set +e

          DURATION_SECONDS=${DURATION_SECONDS:-3600}
          if [ "${DURATION_SECONDS}" -le 0 ]; then
            echo "[FAIL] DURATION_SECONDS must be > 0"
            exit 1
          fi

          NETWORKS=$(jq -r '.networks[] | select(.ENVS.PAUSE_CONTROLLER? != null and (.ENVS.PAUSE_CONTROLLER | ascii_downcase) != "0x0000000000000000000000000000000000000000") | .name' config/networks.json)
          if [ -z "${NETWORKS}" ]; then
            echo "[INFO] No network has ENVS.PAUSE_CONTROLLER set"
            exit 0
          fi

          failed=0
          failed_networks=""
          succeeded_networks=""
          declare -a pids
          declare -a names

          for network in ${NETWORKS}; do
            rpc=""
            chain_id=""

            case "${network}" in
              ethsepolia) rpc="${RPC_URL_SEP_TESTNET}"; chain_id="11155111" ;;
              arbsepolia) rpc="${RPC_URL_ARB_TESTNET}"; chain_id="421614" ;;
              opsepolia) rpc="${RPC_URL_OP_TESTNET}"; chain_id="11155420" ;;
              arbitrum) rpc="${RPC_URL_ARB}"; chain_id="42161" ;;
              optimism) rpc="${RPC_URL_OPT}"; chain_id="10" ;;
              polygon) rpc="${RPC_URL_POLYGON}"; chain_id="137" ;;
              gnosis) rpc="${RPC_URL_GNOSIS}"; chain_id="100" ;;
              base) rpc="${RPC_URL_BASE}"; chain_id="8453" ;;
              celo) rpc="${RPC_URL_CELO}"; chain_id="42220" ;;
              mainnet) rpc="${RPC_URL_MAINNET}"; chain_id="1" ;;
              *)
                echo "[FAIL] ${network}: unknown network mapping"
                failed=1
                failed_networks="${failed_networks} ${network}"
                continue
                ;;
            esac

            if [ -z "${rpc}" ]; then
              echo "[FAIL] ${network}: missing RPC env var for network"
              failed=1
              failed_networks="${failed_networks} ${network}"
              continue
            fi

            echo "[INFO] ${network}: pausing targets for ${DURATION_SECONDS}s"
            forge script script/PauseAllByController.s.sol:PauseAllByController \
              --rpc-url "${rpc}" \
              --private-key "${PRIVATE_KEY}" \
              --sig "run(string,uint256)" "${network}" "${DURATION_SECONDS}" \
              --chain-id "${chain_id}" \
              --broadcast \
              --slow \
              -vv &
            pids+=($!)
            names+=("${network}")
          done

          for i in "${!pids[@]}"; do
            if wait "${pids[$i]}"; then
              echo "[OK] ${names[$i]}"
              succeeded_networks="${succeeded_networks} ${names[$i]}"
            else
              echo "[FAIL] ${names[$i]}"
              failed=1
              failed_networks="${failed_networks} ${names[$i]}"
            fi
          done

          if [ "${failed}" -ne 0 ]; then
            echo "[SUMMARY] pause run completed with failures"
            echo "[SUMMARY] succeeded:${succeeded_networks}"
            echo "[SUMMARY] failed:${failed_networks}"
            exit 1
          fi

          echo "[SUMMARY] pause run completed successfully on all eligible networks"
          echo "[SUMMARY] succeeded:${succeeded_networks}"
  unpause-all-networks-with-pause-controller:
    desc: Unpause factory, communities and strategies on every network with ENVS.PAUSE_CONTROLLER set
    cmds:
      - cmd: |
          set +e

          NETWORKS=$(jq -r '.networks[] | select(.ENVS.PAUSE_CONTROLLER? != null and (.ENVS.PAUSE_CONTROLLER | ascii_downcase) != "0x0000000000000000000000000000000000000000") | .name' config/networks.json)
          if [ -z "${NETWORKS}" ]; then
            echo "[INFO] No network has ENVS.PAUSE_CONTROLLER set"
            exit 0
          fi

          failed=0
          failed_networks=""
          succeeded_networks=""

          for network in ${NETWORKS}; do
            rpc=""
            chain_id=""

            case "${network}" in
              ethsepolia) rpc="${RPC_URL_SEP_TESTNET}"; chain_id="11155111" ;;
              arbsepolia) rpc="${RPC_URL_ARB_TESTNET}"; chain_id="421614" ;;
              opsepolia) rpc="${RPC_URL_OP_TESTNET}"; chain_id="11155420" ;;
              arbitrum) rpc="${RPC_URL_ARB}"; chain_id="42161" ;;
              optimism) rpc="${RPC_URL_OPT}"; chain_id="10" ;;
              polygon) rpc="${RPC_URL_POLYGON}"; chain_id="137" ;;
              gnosis) rpc="${RPC_URL_GNOSIS}"; chain_id="100" ;;
              base) rpc="${RPC_URL_BASE}"; chain_id="8453" ;;
              celo) rpc="${RPC_URL_CELO}"; chain_id="42220" ;;
              mainnet) rpc="${RPC_URL_MAINNET}"; chain_id="1" ;;
              *)
                echo "[FAIL] ${network}: unknown network mapping"
                failed=1
                failed_networks="${failed_networks} ${network}"
                continue
                ;;
            esac

            if [ -z "${rpc}" ]; then
              echo "[FAIL] ${network}: missing RPC env var for network"
              failed=1
              failed_networks="${failed_networks} ${network}"
              continue
            fi

            echo "[INFO] ${network}: unpausing targets"
            if forge script script/UnpauseAllByController.s.sol:UnpauseAllByController \
              --rpc-url "${rpc}" \
              --private-key "${PRIVATE_KEY}" \
              --sig "run(string)" "${network}" \
              --chain-id "${chain_id}" \
              --broadcast \
              -vv; then
              echo "[OK] ${network}"
              succeeded_networks="${succeeded_networks} ${network}"
            else
              echo "[FAIL] ${network}"
              failed=1
              failed_networks="${failed_networks} ${network}"
            fi
          done

          if [ "${failed}" -ne 0 ]; then
            echo "[SUMMARY] unpause run completed with failures"
            echo "[SUMMARY] succeeded:${succeeded_networks}"
            echo "[SUMMARY] failed:${failed_networks}"
            exit 1
          fi

          echo "[SUMMARY] unpause run completed successfully on all eligible networks"
          echo "[SUMMARY] succeeded:${succeeded_networks}"
