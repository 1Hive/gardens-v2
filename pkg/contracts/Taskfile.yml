      - task: refresh-facets-arbsep
      - cmd: |
          case "${PHASE:-all}" in
            ""|all)
              task deploy-facets-arbsep
              task upgrade-arbsep-factory
              task upgrade-arbsep-communities
              task upgrade-arbsep-strategies
              task verify-all-arbsep
              ;;
            factory)
              case "${FACTORY_ACTION:-all}" in
                ""|all) task upgrade-arbsep-factory ;;
                upgrade-impl|upgrade_impl) task upgrade-arbsep-factory-upgrade-impl ;;
                set-community-facets|set_community_facets) task upgrade-arbsep-factory-set-community-facets ;;
                set-strategy-facets|set_strategy_facets) task upgrade-arbsep-factory-set-strategy-facets ;;
                set-pause-controller|set_pause_controller) task upgrade-arbsep-factory-set-pause-controller ;;
                set-registry-template|set_registry_template) task upgrade-arbsep-factory-set-registry-template ;;
                set-strategy-template|set_strategy_template) task upgrade-arbsep-factory-set-strategy-template ;;
                *) echo "unsupported FACTORY_ACTION: ${FACTORY_ACTION}" >&2; exit 1 ;;
              esac
              ;;
            communities) task upgrade-arbsep-communities ;;
            strategies) task upgrade-arbsep-strategies ;;
            *) echo "unsupported PHASE: ${PHASE}" >&2; exit 1 ;;
