          -vvv
  transfer-gas:
    desc: "Transfer native gas token from OLD_PRIVATE_KEY to PK_DEPLOYER. Usage: task transfer-gas NETWORK=<network> [AMOUNT=<native>] [PRESET_AMOUNT=<native>] [DRY_RUN=true]"
    cmds:
      - cmd: |
          : "${PK_DEPLOYER_PW:?missing PK_DEPLOYER_PW}"
          DEPLOYER_ADDRESS="$(cast wallet address --account PK_DEPLOYER --password "${PK_DEPLOYER_PW}")"
          network="{{.NETWORK}}"
          amount_override="{{.AMOUNT}}"
          preset_amount="{{.PRESET_AMOUNT}}"
          dry_run_flag="{{default "false" .DRY_RUN}}"

          : "${network:?missing NETWORK}"
          : "${OLD_PRIVATE_KEY:?missing OLD_PRIVATE_KEY}"
          case "${network}" in
            arbsepolia) rpc="${RPC_URL_ARB_TESTNET}"; symbol="ETH"; buffer="0.0002" ;;
            sepolia) rpc="${RPC_URL_SEP_TESTNET}"; symbol="ETH"; buffer="0.00005" ;;
            opsepolia) rpc="${RPC_URL_OP_TESTNET}"; symbol="ETH"; buffer="0.0002" ;;
            arbitrum) rpc="${RPC_URL_ARB}"; symbol="ETH"; buffer="0.0002" ;;
            optimism) rpc="${RPC_URL_OPT}"; symbol="ETH"; buffer="0.0002" ;;
            mainnet|ethereum) rpc="${RPC_URL_ETHEREUM}"; symbol="ETH"; buffer="0.00005" ;;
            base) rpc="${RPC_URL_BASE}"; symbol="ETH"; buffer="0.0002" ;;
            polygon) rpc="${RPC_URL_POLYGON}"; symbol="POL"; buffer="0.1" ;;
            gnosis|xdai) rpc="${RPC_URL_GNOSIS}"; symbol="xDAI"; buffer="0.01" ;;
            celo) rpc="${RPC_URL_CELO}"; symbol="CELO"; buffer="0.01" ;;
            *)
              echo "Unsupported NETWORK=${network}"
              echo "Supported: arbsepolia sepolia opsepolia arbitrum optimism ethereum mainnet base polygon gnosis xdai celo"
              exit 1
              ;;
          esac

          : "${rpc:?missing RPC for ${network}}"

          from="$(cast wallet address --private-key "${OLD_PRIVATE_KEY}")"
          to="$(cast wallet address --account PK_DEPLOYER --password "${PK_DEPLOYER_PW}")"
          balance="$(cast balance "${from}" --rpc-url "${rpc}")"
          buffer_wei="$(cast to-wei "${buffer}" ether)"

          if [ "${balance}" = "0" ]; then
            echo "Network: ${network}"
            echo "From: ${from}"
            echo "To: ${to}"
            echo "Balance is zero. Skipping."
            exit 0
          fi

          gas_price="$(cast gas-price --rpc-url "${rpc}")"
          gas_limit="$(cast estimate "${to}" --value 1 --from "${from}" --rpc-url "${rpc}" 2>/dev/null || echo 21000)"

          reserve="$(python3 -c 'import sys; gas=int(sys.argv[1]); gas_price=int(sys.argv[2]); buffer=int(sys.argv[3]); print((gas * gas_price * 12 // 10) + buffer)' "${gas_limit}" "${gas_price}" "${buffer_wei}")"

          if [ -n "${amount_override}" ]; then
            amount_wei="$(cast to-wei "${amount_override}" ether)"
          elif [ -n "${preset_amount}" ]; then
            amount_wei="$(cast to-wei "${preset_amount}" ether)"
          else
            amount_wei="$(python3 -c 'import sys; balance=int(sys.argv[1]); reserve=int(sys.argv[2]); print(balance - reserve)' "${balance}" "${reserve}")"
          fi

          if [ "${amount_wei}" -le 0 ]; then
            echo "Network: ${network}"
            echo "From: ${from}"
            echo "To: ${to}"
            echo "Balance (wei): ${balance}"
            echo "Reserve (wei): ${reserve}"
            echo "No sweepable ${symbol} after reserve. Skipping."
            exit 0
          fi

          python3 -c 'import sys; amount=int(sys.argv[1]); reserve=int(sys.argv[2]); balance=int(sys.argv[3]); symbol=sys.argv[4]; assert amount + reserve <= balance, f"Insufficient balance for transfer plus reserve: amount={amount} reserve={reserve} balance={balance} ({symbol})"' "${amount_wei}" "${reserve}" "${balance}" "${symbol}"

          echo "Network: ${network}"
          echo "RPC: ${rpc}"
          echo "From: ${from}"
          echo "To: ${to}"
          echo "Balance (wei): ${balance}"
          echo "Amount (wei): ${amount_wei}"
          echo "Gas limit estimate: ${gas_limit}"
          echo "Gas price (wei): ${gas_price}"
          echo "Reserve (wei): ${reserve}"

          if [ "${dry_run_flag}" = "true" ]; then
            echo "Dry run only."
            exit 0
          fi

          cast send "${to}" \
            --private-key "${OLD_PRIVATE_KEY}" \
            --rpc-url "${rpc}" \
            --value "${amount_wei}"
  transfer-gas-preset:
    desc: "Transfer an inline preset amount for NETWORK from OLD_PRIVATE_KEY to PK_DEPLOYER. Usage: task transfer-gas-preset NETWORK=<network> PRESET_AMOUNT=<native> [DRY_RUN=true]"
    cmds:
      - task: transfer-gas
        vars:
          NETWORK: "{{.NETWORK}}"
          PRESET_AMOUNT: "{{.PRESET_AMOUNT}}"
          DRY_RUN: '{{default "false" .DRY_RUN}}'
  log-old-private-key-balances:
    desc: "Log OLD_PRIVATE_KEY native balances on all supported transfer networks"
    cmds:
      - cmd: |
          : "${OLD_PRIVATE_KEY:?missing OLD_PRIVATE_KEY}"
          from="$(cast wallet address --private-key "${OLD_PRIVATE_KEY}")"
          echo "Address from OLD_PRIVATE_KEY: ${from}"
          for network in arbsepolia sepolia opsepolia arbitrum optimism mainnet base polygon gnosis celo; do
            case "${network}" in
              arbsepolia) rpc="${RPC_URL_ARB_TESTNET}"; symbol="ETH" ;;
              sepolia) rpc="${RPC_URL_SEP_TESTNET}"; symbol="ETH" ;;
              opsepolia) rpc="${RPC_URL_OP_TESTNET}"; symbol="ETH" ;;
              arbitrum) rpc="${RPC_URL_ARB}"; symbol="ETH" ;;
              optimism) rpc="${RPC_URL_OPT}"; symbol="ETH" ;;
              mainnet) rpc="${RPC_URL_ETHEREUM}"; symbol="ETH" ;;
              base) rpc="${RPC_URL_BASE}"; symbol="ETH" ;;
              polygon) rpc="${RPC_URL_POLYGON}"; symbol="POL" ;;
              gnosis) rpc="${RPC_URL_GNOSIS}"; symbol="xDAI" ;;
              celo) rpc="${RPC_URL_CELO}"; symbol="CELO" ;;
            esac

            if [ -z "${rpc}" ]; then
              echo "${network}: missing RPC env"
              continue
            fi

            balance_wei="$(cast balance "${from}" --rpc-url "${rpc}")"
            balance_native="$(cast from-wei "${balance_wei}" ether)"
            echo "${network}: ${balance_native} ${symbol} (${balance_wei} wei)"
          done
