  grant-upgrade-access-testnets:
    desc: Grant upgrade access to PK_DEPLOYER from PK_TESTNET_OWNER on all configured testnet ProxyOwner contracts
    cmds:
      - cmd: |
          set -euo pipefail
          : "${PK_TESTNET_OWNER_PW:?missing PK_TESTNET_OWNER_PW}"
          : "${PK_DEPLOYER_PW:?missing PK_DEPLOYER_PW}"

          testnet_owner_address="$(cast wallet address --account PK_TESTNET_OWNER --password "${PK_TESTNET_OWNER_PW}")"
          deployer_address="$(cast wallet address --account PK_DEPLOYER --password "${PK_DEPLOYER_PW}")"

          jq -r '.networks[] | select(.testnet == true and (.ENVS.PROXY_OWNER? != null) and (.ENVS.PROXY_OWNER != "")) | [.name, .ENVS.PROXY_OWNER] | @tsv' config/networks.json |
          while IFS=$'\t' read -r network proxy_owner; do
            case "${network}" in
              ethsepolia) rpc="${RPC_URL_SEP_TESTNET}" ;;
              arbsepolia) rpc="${RPC_URL_ARB_TESTNET}" ;;
              opsepolia) rpc="${RPC_URL_OP_TESTNET}" ;;
              *)
                echo "Skipping unsupported testnet ${network}"
                continue
                ;;
            esac

            : "${rpc:?missing RPC for ${network}}"

            echo "[INFO] ${network}: grantUpgradeAccess(${deployer_address}) on ${proxy_owner} from ${testnet_owner_address}"

            ETH_PASSWORD= cast send "${proxy_owner}" \
              "grantUpgradeAccess(address)" "${deployer_address}" \
              --rpc-url "${rpc}" \
              --account PK_TESTNET_OWNER \
              --password "${PK_TESTNET_OWNER_PW}"
          done
  verify-upgrade-access:
    desc: Verify upgradeAccess slot on all networks ProxyOwner contracts matches PK_DEPLOYER address
    cmds:
      - cmd: |
          set -euo pipefail
          : "${PK_DEPLOYER_PW:?missing PK_DEPLOYER_PW}"

          deployer_address="$(cast wallet address --account PK_DEPLOYER --password "${PK_DEPLOYER_PW}")"
          failed=0

          jq -r '.networks[] | select((.ENVS.PROXY_OWNER? != null) and (.ENVS.PROXY_OWNER != "")) | [.name, .ENVS.PROXY_OWNER] | @tsv' config/networks.json |
          while IFS=$'\t' read -r network proxy_owner; do
            case "${network}" in
              ethsepolia) rpc="${RPC_URL_SEP_TESTNET}" ;;
              arbsepolia) rpc="${RPC_URL_ARB_TESTNET}";;
              opsepolia) rpc="${RPC_URL_OP_TESTNET}" ;;
              arbitrum) rpc="${RPC_URL_ARB}" ;;
              optimism) rpc="${RPC_URL_OPT}"; ;;
              polygon) rpc="${RPC_URL_POLYGON}"; ;;
              gnosis) rpc="${RPC_URL_GNOSIS}"; ;;
              base) rpc="${RPC_URL_BASE}"; ;;
              celo) rpc="${RPC_URL_CELO}"; ;;
              ethereum) rpc="${RPC_URL_ETHEREUM}" ;;
              *)
                echo "[SKIP] ${network}: unsupported network"
                continue
                ;;
            esac

            : "${rpc:?missing RPC for ${network}}"

            actual="$(cast call "${proxy_owner}" "upgradeAccess()(address)" --rpc-url "${rpc}")"
            if [ "$(echo "${actual}" | tr '[:upper:]' '[:lower:]')" = "$(echo "${deployer_address}" | tr '[:upper:]' '[:lower:]')" ]; then
              echo "✅ ${network}: upgradeAccess = ${actual}"
            else
              echo "❌ ${network}: upgradeAccess = ${actual} (expected ${deployer_address})"
              failed=1
            fi
          done

          if [ "${failed}" = "1" ]; then
            echo "Some networks ProxyOwner contracts do not have PK_DEPLOYER as upgradeAccess"
            exit 1
          fi
