      - cmd: |
          : "${PK_DEPLOYER_PW:?missing PK_DEPLOYER_PW}"
          DEPLOYER_ADDRESS="$(cast wallet address --account PK_DEPLOYER --password "${PK_DEPLOYER_PW}")"
          RESUME_FLAG=""
          if [ "${RESUME:-false}" = "true" ]; then
            RESUME_FLAG="--resume"
          fi
          SIG="run(string)"
          case "${PHASE:-all}" in
            ""|all) ;;
            factory)
              case "${FACTORY_ACTION:-all}" in
                ""|all) SIG="runFactory(string)" ;;
                upgrade-impl|upgrade_impl) SIG="runFactoryUpgradeImpl(string)" ;;
                set-community-facets|set_community_facets) SIG="runFactorySetCommunityFacets(string)" ;;
                set-strategy-facets|set_strategy_facets) SIG="runFactorySetStrategyFacets(string)" ;;
                set-pause-controller|set_pause_controller) SIG="runFactorySetPauseController(string)" ;;
                set-registry-template|set_registry_template) SIG="runFactorySetRegistryTemplate(string)" ;;
                set-strategy-template|set_strategy_template) SIG="runFactorySetStrategyTemplate(string)" ;;
                *) echo "unsupported FACTORY_ACTION: ${FACTORY_ACTION}" >&2; exit 1 ;;
              esac
              ;;
            communities) SIG="runCommunities(string)" ;;
            strategies) SIG="runStrategies(string)" ;;
            *) echo "unsupported PHASE: ${PHASE}" >&2; exit 1 ;;
