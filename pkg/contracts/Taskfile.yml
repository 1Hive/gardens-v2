  upgrade-streaming-escrows-opsep:
    desc: Deploy or upgrade streaming escrows on opsep via direct broadcast
    cmds:
      - cmd: |
          set -euo pipefail
          : "${PK_DEPLOYER_PW:?missing PK_DEPLOYER_PW}"
          DEPLOYER_ADDRESS="$(cast wallet address --account PK_DEPLOYER --password "${PK_DEPLOYER_PW}")"
          BASE_GAS_WEI="$(cast gas-price --rpc-url "${RPC_URL_OP_TESTNET}")"
          GAS_PRICE_WEI_VALUE="${GAS_PRICE_WEI:-$(( BASE_GAS_WEI * 2 ))}"
          FACTORY_PROXY="$(jq -r '.networks[] | select(.name=="opsepolia") | .ENVS.STREAMING_ESCROW_FACTORY // empty' config/networks.json)"
          EIP1967_IMPLEMENTATION_SLOT="0x360894a13ba1a3210667c828492db98dca3e2076cc3735a920a3ca505d382bbc"
          RESUME_FLAG=""
          if [ "${RESUME:-false}" = "true" ]; then
            RESUME_FLAG="--resume"
          fi
          echo "Using gas price for opsepolia: ${GAS_PRICE_WEI_VALUE} wei"
          ETH_PASSWORD= DEPLOYER_ADDRESS="${DEPLOYER_ADDRESS}" forge script script/DeployOrUpgradeStreamingEscrows.s.sol:DeployOrUpgradeStreamingEscrows \
          --rpc-url ${RPC_URL_OP_TESTNET} \
          --account PK_DEPLOYER \
          --password "${PK_DEPLOYER_PW}" \
          --etherscan-api-key ${ETHERSCAN_API_KEY} \
          --sig "run(string,address,bool,bool)" 'opsepolia' ${I:-0x0000000000000000000000000000000000000000} {{default "false" .DEPLOY_IMPLEMENTATION_ONLY}} {{default "false" .SAFE_PAYLOAD}} \
          --ffi \
          --broadcast \
          --slow \
          --with-gas-price ${GAS_PRICE_WEI_VALUE} \
          ${RESUME_FLAG} \
          --verify \
          --chain-id 11155420 \
          -vvv

          if [ -n "${FACTORY_PROXY}" ]; then
            ESCROW_IMPLEMENTATION="$(cast call "${FACTORY_PROXY}" "escrowImplementation()(address)" --rpc-url "${RPC_URL_OP_TESTNET}")"
            IMPLEMENTATION_SLOT_VALUE="$(cast storage "${FACTORY_PROXY}" "${EIP1967_IMPLEMENTATION_SLOT}" --rpc-url "${RPC_URL_OP_TESTNET}")"
            FACTORY_IMPLEMENTATION="0x${IMPLEMENTATION_SLOT_VALUE:26}"

            NETWORK_NAME="opsepolia" FACTORY_IMPLEMENTATION="${FACTORY_IMPLEMENTATION}" ESCROW_IMPLEMENTATION="${ESCROW_IMPLEMENTATION}" node -e '
              const fs = require("fs");
              const path = "config/networks.json";
              const networkName = process.env.NETWORK_NAME;
              const factoryImplementation = process.env.FACTORY_IMPLEMENTATION;
              const escrowImplementation = process.env.ESCROW_IMPLEMENTATION;
              const json = JSON.parse(fs.readFileSync(path, "utf8"));
              const network = json.networks.find((entry) => entry.name === networkName);
              if (!network) throw new Error(`Missing network ${networkName}`);
              network.IMPLEMENTATIONS ||= {};
              network.IMPLEMENTATIONS.STREAMING_ESCROW_FACTORY = factoryImplementation;
              network.IMPLEMENTATIONS.STREAMING_ESCROW = escrowImplementation;
              fs.writeFileSync(path, JSON.stringify(json, null, 2) + "\n");
              console.log(`Updated ${networkName} streaming escrow implementations in ${path}`);
            '
          fi
