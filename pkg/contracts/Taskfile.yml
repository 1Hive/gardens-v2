  submit-safe-payloads-grant-upgrade-access-all-chains:
    desc: Submit ProxyOwner grantUpgradeAccess Safe payloads on ethereum, arbitrum, optimism, polygon, gnosis, base, celo (set DRY_RUN=true to only log planned actions)
    cmds:
      - cmd: |
          set -e
          dry_run_flag="{{default "false" .DRY_RUN}}"
          : "${PK_DEPLOYER_PW:?missing PK_DEPLOYER_PW}"
          deployer_address="$(cast wallet address --account PK_DEPLOYER --password "${PK_DEPLOYER_PW}")"
          deployer_address_lc="$(echo "${deployer_address}" | tr '[:upper:]' '[:lower:]')"
          deployer_address_no0x="${deployer_address_lc#0x}"
          grant_selector="0x00c53432"
          grant_data="${grant_selector}000000000000000000000000${deployer_address_no0x}"
          upgrade_selector="0x3659cfe6"
          ERC1967_IMPLEMENTATION_SLOT="0x360894A13BA1A3210667C828492DB98DCA3E2076CC3735A920A3CA505D382BBC"

          for chain in ethereum arbitrum optimism polygon gnosis base celo; do
            case "${chain}" in
              ethereum)
                RPC_ENV="RPC_URL_ETHEREUM"
                safe_chain="mainnet"
                payload_chain="mainnet"
                ;;
              arbitrum) RPC_ENV="RPC_URL_ARB" ;;
              optimism) RPC_ENV="RPC_URL_OPT" ;;
              polygon) RPC_ENV="RPC_URL_POLYGON" ;;
              gnosis) RPC_ENV="RPC_URL_GNOSIS" ;;
              base) RPC_ENV="RPC_URL_BASE" ;;
              celo) RPC_ENV="RPC_URL_CELO" ;;
              *) echo "unsupported chain: ${chain}" >&2; exit 1 ;;
            esac

            if [ -z "${safe_chain:-}" ]; then
              safe_chain="${chain}"
            fi
            if [ -z "${payload_chain:-}" ]; then
              payload_chain="${chain}"
            fi

            eval "RPC_URL=\${${RPC_ENV}:-}"
            if [ -z "${RPC_URL}" ]; then
              echo "missing ${RPC_ENV}" >&2
              exit 1
            fi

            proxy_owner_from_config="$(jq -r --arg chain "${chain}" '.networks[] | select(.name == $chain) | .ENVS.PROXY_OWNER // empty' config/networks.json | head -n 1)"
            if [ -z "${proxy_owner_from_config}" ] || [ "${proxy_owner_from_config}" = "null" ]; then
              echo "${chain}: missing ENVS.PROXY_OWNER in config/networks.json" >&2
              exit 1
            fi

            proxy_owner_impl_from_config="$(jq -r --arg chain "${chain}" '.networks[] | select(.name == $chain) | .IMPLEMENTATIONS.PROXY_OWNER // empty' config/networks.json | head -n 1)"
            if [ -z "${proxy_owner_impl_from_config}" ] || [ "${proxy_owner_impl_from_config}" = "null" ]; then
              echo "${chain}: missing IMPLEMENTATIONS.PROXY_OWNER in config/networks.json" >&2
              exit 1
            fi
            proxy_owner_impl_lc="$(echo "${proxy_owner_impl_from_config}" | tr '[:upper:]' '[:lower:]')"
            proxy_owner_impl_no0x="${proxy_owner_impl_lc#0x}"
            upgrade_data="${upgrade_selector}000000000000000000000000${proxy_owner_impl_no0x}"

            payload="transaction-builder/${payload_chain}-proxy-owner-upgrade-and-grant-payload.json"
            if [ ! -f "${payload}" ]; then
              echo "missing payload: ${payload}" >&2
              exit 1
            fi

            # Normalize targets per run so payload stale addresses are never used.
            chain_payload="$(mktemp)"
            jq --arg proxyOwner "${proxy_owner_from_config}" --arg proxyOwnerImplementation "${proxy_owner_impl_from_config}" --arg newWallet "${deployer_address}" --arg grantData "${grant_data}" --arg upgradeData "${upgrade_data}" '
              .transactions = [.transactions[] |
                if ((.contractMethod.name // "") == "grantUpgradeAccess")
                then ((.contractInputsValues.newUpgradeWallet = $newWallet) | (.data = $grantData))
                elif ((.contractMethod.name // "") == "upgradeTo")
                then ((.contractInputsValues.newImplementation = $proxyOwnerImplementation) | (.data = $upgradeData))
                else .
                end |
                if ((.contractMethod.name // "") == "upgradeTo") or ((.contractMethod.name // "") == "grantUpgradeAccess")
                then (.to = $proxyOwner)
                else .
                end
              ]
            ' "${payload}" > "${chain_payload}"

            proxy_owner="${proxy_owner_from_config}"
            target_upgrade_wallet="$(jq -r '.transactions[] | select((.contractMethod.name // "") == "grantUpgradeAccess") | .contractInputsValues.newUpgradeWallet' "${chain_payload}" | head -n 1)"
            if [ -z "${target_upgrade_wallet}" ] || [ "${target_upgrade_wallet}" = "null" ]; then
              echo "${chain}: missing grantUpgradeAccess target in payload" >&2
              rm -f "${chain_payload}"
              exit 1
            fi

            current_owner="$(cast call "${proxy_owner}" "owner()(address)" --rpc-url "${RPC_URL}" | tr -d '\n')"
            current_owner_lc="$(echo "${current_owner}" | tr '[:upper:]' '[:lower:]')"
            target_upgrade_wallet_lc="$(echo "${target_upgrade_wallet}" | tr '[:upper:]' '[:lower:]')"
            if [ "${current_owner_lc}" = "${target_upgrade_wallet_lc}" ]; then
              echo "${chain}: skip submission, owner already ${target_upgrade_wallet}"
              continue
            fi

            impl_slot_value="$(cast storage "${proxy_owner}" "${ERC1967_IMPLEMENTATION_SLOT}" --rpc-url "${RPC_URL}")"
            implementation="0x${impl_slot_value: -40}"
            implementation_lc="$(echo "${implementation}" | tr '[:upper:]' '[:lower:]')"
            payload_upgrade_implementation="$(jq -r '.transactions[] | select((.contractMethod.name // "") == "upgradeTo") | .contractInputsValues.newImplementation' "${chain_payload}" | head -n 1)"
            payload_upgrade_implementation_lc="$(echo "${payload_upgrade_implementation}" | tr '[:upper:]' '[:lower:]')"

            submit_payload="${chain_payload}"
            origin_prefix="proxy-owner-upgrade-and-grant"
            action_summary="upgradeTo(${payload_upgrade_implementation}) + grantUpgradeAccess(${target_upgrade_wallet})"
            if [ -n "${payload_upgrade_implementation}" ] && [ "${payload_upgrade_implementation}" != "null" ] && [ "${implementation_lc}" = "${payload_upgrade_implementation_lc}" ]; then
              tmp_payload="$(mktemp)"
              jq '.transactions = [.transactions[] | select((.contractMethod.name // "") != "upgradeTo")]' "${submit_payload}" > "${tmp_payload}"
              if [ "$(jq '.transactions | length' "${tmp_payload}")" -eq 0 ]; then
                echo "${chain}: no grant transaction left in filtered payload" >&2
                rm -f "${chain_payload}"
                rm -f "${tmp_payload}"
                exit 1
              fi
              submit_payload="${tmp_payload}"
              origin_prefix="proxy-owner-grant-only"
              action_summary="grantUpgradeAccess(${target_upgrade_wallet})"
              echo "${chain}: current implementation already equals payload upgrade target (${payload_upgrade_implementation}), action is grantUpgradeAccess only"
            else
              echo "${chain}: implementation differs from payload upgrade target (live ${implementation}, payload ${payload_upgrade_implementation}), action is upgradeTo + grantUpgradeAccess"
            fi

            echo "${chain}: planned action -> ${action_summary}"
            if [ "${dry_run_flag}" = "true" ]; then
              echo "${chain}: DRY_RUN=true, would submit payload ${submit_payload} with origin ${origin_prefix}"
              rm -f "${chain_payload}"
              if [ -n "${tmp_payload:-}" ]; then
                rm -f "${tmp_payload}"
                unset tmp_payload
              fi
              continue
            fi

            python scripts/submit_safe_payloads.py \
              --safe 0x9a17De1f0caD0c592F656410997E4B685d339029 \
              --keystore ~/.foundry/keystores/pkGarden \
              --service-chain "${safe_chain}" \
              --payload-file "${submit_payload}" \
              --origin-prefix "${origin_prefix}"

            if [ -n "${tmp_payload:-}" ]; then
              rm -f "${tmp_payload}"
              unset tmp_payload
            fi
            rm -f "${chain_payload}"
            unset safe_chain
            unset payload_chain
          done
