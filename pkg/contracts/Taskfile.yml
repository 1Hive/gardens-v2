  refresh-facets-all-mainnets:
    desc: Refresh facet snapshots on ethereum, arbitrum, optimism, polygon, gnosis, base, celo
    cmds:
      - cmd: |
          set +e
          failed=0

          for network in ethereum arbitrum optimism polygon gnosis base celo; do
            if task "refresh-facets-${network}"; then
              echo "✅ ${network}: success"
            else
              echo "⚠️ ${network}: initial attempt failed, retrying once"
              sleep 3
              if task "refresh-facets-${network}"; then
                echo "✅ ${network}: success on retry"
              else
                case "${network}" in
                  ethereum) chain_id=1 ;;
                  arbitrum) chain_id=42161 ;;
                  optimism) chain_id=10 ;;
                  polygon) chain_id=137 ;;
                  gnosis) chain_id=100 ;;
                  base) chain_id=8453 ;;
                  celo) chain_id=42220 ;;
                  *) chain_id="" ;;
                esac

                run_latest=""
                if [ -n "${chain_id}" ]; then
                  if [ -f "broadcast/RefreshFacetSnapshots.s.sol/${chain_id}/run-latest.json" ]; then
                    run_latest="broadcast/RefreshFacetSnapshots.s.sol/${chain_id}/run-latest.json"
                  elif [ -f "../../broadcast/RefreshFacetSnapshots.s.sol/${chain_id}/run-latest.json" ]; then
                    run_latest="../../broadcast/RefreshFacetSnapshots.s.sol/${chain_id}/run-latest.json"
                  fi
                fi

                if [ -n "${run_latest}" ]; then
                  echo "⚠️ ${network}: retry failed, attempting RESUME=true using ${run_latest}"
                  if RESUME=true task "refresh-facets-${network}"; then
                    echo "✅ ${network}: success on resume"
                  else
                    echo "❌ ${network}: failed"
                    failed=1
                  fi
                else
                  echo "❌ ${network}: failed (no run-latest.json found for resume)"
                  failed=1
                fi
              fi
            fi
          done

          if [ "$failed" -ne 0 ]; then
            echo "One or more networks failed."
            exit 1
          fi

          echo "All networks succeeded."

