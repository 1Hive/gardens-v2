  renounce-proxy-owner-upgrade-access-testnets:
    desc: Renounce ProxyOwner upgrade access on all configured testnets
    cmds:
      - cmd: |
          set -euo pipefail
          : "${PK_DEPLOYER_PW:?missing PK_DEPLOYER_PW}"

          deployer_address="$(cast wallet address --account PK_DEPLOYER --password "${PK_DEPLOYER_PW}")"

          jq -r '.networks[] | select(.testnet == true and (.ENVS.PROXY_OWNER? != null) and (.ENVS.PROXY_OWNER != "")) | [.name, .ENVS.PROXY_OWNER] | @tsv' config/networks.json |
          while IFS=$'\t' read -r network proxy_owner; do
            case "${network}" in
              ethsepolia)
                rpc="${RPC_URL_SEP_TESTNET}"
                task_name="renounce-proxy-owner-upgrade-access-ethsep"
                ;;
              arbsepolia)
                rpc="${RPC_URL_ARB_TESTNET}"
                task_name="renounce-proxy-owner-upgrade-access-arbsep"
                ;;
              opsepolia)
                rpc="${RPC_URL_OP_TESTNET}"
                task_name="renounce-proxy-owner-upgrade-access-opsep"
                ;;
              *)
                echo "[SKIP] ${network}: unsupported testnet"
                continue
                ;;
            esac

            : "${rpc:?missing RPC for ${network}}"

            current_upgrade_access="$(cast call --rpc-url "${rpc}" "${proxy_owner}" "upgradeAccess()(address)" 2>/dev/null || true)"
            current_upgrade_access_lower="$(echo "${current_upgrade_access}" | tr '[:upper:]' '[:lower:]')"
            deployer_address_lower="$(echo "${deployer_address}" | tr '[:upper:]' '[:lower:]')"

            if [ "${current_upgrade_access_lower}" = "0x0000000000000000000000000000000000000000" ]; then
              echo "[SKIP] ${network}: ProxyOwner upgradeAccess already renounced"
              continue
            fi

            if [ "${current_upgrade_access_lower}" != "${deployer_address_lower}" ]; then
              echo "[SKIP] ${network}: upgradeAccess is ${current_upgrade_access}, expected ${deployer_address}"
              continue
            fi

            echo "Renouncing ProxyOwner upgrade access on ${network}"
            task "${task_name}"
          done
