silent: true
version: "3"

dotenv: [".env"]

env:
  RPC_URL_LOCALHOST: http://127.0.0.1:8545

tasks:
  print:
    desc: Print
    cmds:
      - echo ${RPC_URL}
  generate-wallet:
    desc: Generate a new wallet and print PK + address, plus OLD_PRIVATE_KEY when available
    cmds:
      - cmd: |
          PK="0x$(openssl rand -hex 32)"
          ADDRESS="$(cast wallet address --private-key "${PK}")"
          echo "PK=${PK}"
          echo "ADDRESS=${ADDRESS}"
          if [ -n "${OLD_PRIVATE_KEY:-}" ]; then
            OLD_ADDRESS="$(cast wallet address --private-key "${OLD_PRIVATE_KEY}")"
            echo ""
            echo "OLD_PRIVATE_KEY=${OLD_PRIVATE_KEY}"
            echo "OLD_PRIVATE_KEY_ADDRESS=${OLD_ADDRESS}"
          fi
          echo ""
          echo "# Replace PK_DEPLOYER keystore (interactive password prompt)"
          echo "rm -f ~/.foundry/keystores/PK_DEPLOYER && cast wallet import PK_DEPLOYER --private-key ${PK}"
          echo ""
          echo "# Replace PK_DEPLOYER keystore (non-interactive, uses PK_DEPLOYER_PW)"
          echo "rm -f ~/.foundry/keystores/PK_DEPLOYER && CAST_UNSAFE_PASSWORD=\"\$PK_DEPLOYER_PW\" cast wallet import PK_DEPLOYER --private-key ${PK} --unsafe-password \"\$PK_DEPLOYER_PW\""
  change-wallet:
    desc: Generate a new wallet and set ENVS.SENDER to it for all networks in config/networks.json
    cmds:
      - cmd: |
          PK="0x$(openssl rand -hex 32)"
          ADDRESS="$(cast wallet address --private-key "${PK}")"

          if [ ! -f config/networks.json ]; then
            echo "❌ Missing config/networks.json"
            exit 1
          fi

          ADDRESS="${ADDRESS}" node -e '
            const fs = require("fs");
            const path = "config/networks.json";
            const address = process.env.ADDRESS;

            const content = fs.readFileSync(path, "utf8");
            const json = JSON.parse(content);

            if (!Array.isArray(json.networks)) {
              throw new Error("Invalid networks.json: missing networks array");
            }

            let updated = 0;
            for (const network of json.networks) {
              if (!network.ENVS || typeof network.ENVS !== "object") {
                network.ENVS = {};
              }
              network.ENVS.SENDER = address;
              updated++;
            }

            fs.writeFileSync(path, JSON.stringify(json, null, 2) + "\n");
            console.log(`✅ Updated ENVS.SENDER for ${updated} networks in ${path}`);
          '

          echo ""
          echo "PK=${PK}"
          echo "ADDRESS=${ADDRESS}"
          echo ""
          echo "# Replace PK_DEPLOYER keystore (interactive password prompt)"
          echo "rm -f ~/.foundry/keystores/PK_DEPLOYER && cast wallet import PK_DEPLOYER --private-key ${PK}"
          echo ""
          echo "# Replace PK_DEPLOYER keystore (non-interactive, uses PK_DEPLOYER_PW)"
          echo "rm -f ~/.foundry/keystores/PK_DEPLOYER && CAST_UNSAFE_PASSWORD=\"\$PK_DEPLOYER_PW\" cast wallet import PK_DEPLOYER --private-key ${PK} --unsafe-password \"\$PK_DEPLOYER_PW\""
  aggregate-abi:
    desc: Aggregate abi
    cmds:
      - echo "📦 Aggregating diamond ABIs..."
      - node scripts/aggregate-diamond-abi.js
      - echo "✅ ABI aggregation complete"
  aggregate-abi-verbose:
    desc: Aggregate abi verbose
    cmds:
      - echo "📦 Aggregating diamond ABIs (verbose mode)..."
      - node scripts/aggregate-diamond-abi.js --verbose
      - echo "✅ ABI aggregation complete"
  sync-abis:
    desc: Sync ABIs from out
    cmds:
      - ./scripts/sync-abis.sh
  sync-proxies:
    desc: Sync PROXIES in config/networks.json from the subgraph for NETWORK=<network>
    cmds:
      - cmd: |
          NETWORK="{{.NETWORK}}"
          if [ -z "${NETWORK}" ] || [ "${NETWORK}" = "<no value>" ]; then
            echo "missing NETWORK, e.g. task sync-proxies NETWORK=opsepolia" >&2
            exit 1
          fi
          mkdir -p .tmp
          flock .tmp/networks-json.lock sh -c 'node ../subgraph/src/scripts/list-proxies.cjs "$1"' _ "${NETWORK}"
  sync-proxies-testnets:
    desc: Sync PROXIES in config/networks.json for all testnets
    cmds:
      - task: sync-proxies
        vars:
          NETWORK: ethsepolia
      - task: sync-proxies
        vars:
          NETWORK: arbsepolia
      - task: sync-proxies
        vars:
          NETWORK: opsepolia
  sync-proxies-mainnets:
    desc: Sync PROXIES in config/networks.json for all mainnets
    cmds:
      - task: sync-proxies
        vars:
          NETWORK: ethereum
      - task: sync-proxies
        vars:
          NETWORK: arbitrum
      - task: sync-proxies
        vars:
          NETWORK: optimism
      - task: sync-proxies
        vars:
          NETWORK: polygon
      - task: sync-proxies
        vars:
          NETWORK: gnosis
      - task: sync-proxies
        vars:
          NETWORK: base
      - task: sync-proxies
        vars:
          NETWORK: celo
  sync-proxies-all:
    desc: Sync PROXIES in config/networks.json for all supported networks
    cmds:
      - task: sync-proxies-testnets
      - task: sync-proxies-mainnets
  verify-storage:
    desc: Verify storage
    cmds:
      - echo "🔍 Verifying diamond storage layouts..."
      - ./scripts/verify-storage-layout.sh || (echo "❌ Storage verification FAILED! Fix storage alignment before deploying." && exit 1)
      - echo "✅ Storage verification passed"
  verify-storage-quick:
    desc: Verify storage quick
    cmds:
      - echo "🔍 Verifying diamond storage layouts (quick mode)..."
      - ./scripts/verify-storage-layout.sh --skip-build || (echo "❌ Storage verification FAILED! Fix storage alignment before deploying." && exit 1)
      - echo "✅ Storage verification passed"
  verify-storage-verbose:
    desc: Verify storage verbose
    cmds:
      - echo "🔍 Verifying diamond storage layouts (verbose mode)..."
      - ./scripts/verify-storage-layout.sh --verbose || (echo "❌ Storage verification FAILED! Fix storage alignment before deploying." && exit 1)
      - echo "✅ Storage verification passed"
  fork:
    desc: Fork
    cmds:
      - anvil --chain-id 1337
  fork0:
    desc: Fork0
    cmds:
      - anvil --host=0.0.0.0 --chain-id 1337
  fork0b5:
    desc: Fork0b5
    cmds:
      - anvil --host=0.0.0.0 --chain-id 1337 -b 5
  fund_arb:
    desc: Fund arb
    cmds:
      - cmd: |
          cast send \
          --from 0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266 \
          --unlocked 0xefeab1ea32a5d7c6b1de6192ee531a2ef51198d9 \
          --value 100ether \
          --rpc-url=${RPC_URL_LOCALHOST}
  test1:
    desc: Test1
    cmds:
      - cmd: |
          forge test --fork-url ${RPC_URL_LOCALHOST} --mc CVStrategyTest \
          --sender 0xf39fd6e51aad88f6f4ce6ab8827279cfffb92266 -vv
  smoke-test-all:
    desc: Run fork smoke test on all supported mainnets
    cmds:
      - cmd: |
          failed=0
          for chain in ethereum arbitrum optimism polygon gnosis base celo; do
            echo "==> smoke ${chain}"
            if ! FORK_HEALTHCHECK_CHAIN="${chain}" forge test --match-contract ForkLifecycleHealthcheck -vvv; then
              failed=1
            fi
          done
          exit ${failed}
  smoke-test-mainnets:
    desc: Run fork smoke test on ethereum, arbitrum, optimism, polygon, gnosis, base, celo
    cmds:
      - cmd: |
          for chain in ethereum arbitrum optimism polygon gnosis base celo; do
            echo "==> smoke ${chain}"
            bash ./scripts/run-smoke-chain.sh "${chain}" || exit 1
          done
  smoke-test-ethereum:
    desc: Run fork smoke test on ethereum
    cmds:
      - cmd: |
          FORK_HEALTHCHECK_CHAIN=ethereum forge test --match-contract ForkLifecycleHealthcheck -vvv
  smoke-test-arbitrum:
    desc: Run fork smoke test on arbitrum
    cmds:
      - cmd: |
          FORK_HEALTHCHECK_CHAIN=arbitrum forge test --match-contract ForkLifecycleHealthcheck -vvv
  smoke-test-optimism:
    desc: Run fork smoke test on optimism
    cmds:
      - cmd: |
          FORK_HEALTHCHECK_CHAIN=optimism forge test --match-contract ForkLifecycleHealthcheck -vvv
  smoke-test-polygon:
    desc: Run fork smoke test on polygon
    cmds:
      - cmd: |
          FORK_HEALTHCHECK_CHAIN=polygon forge test --match-contract ForkLifecycleHealthcheck -vvv
  smoke-test-gnosis:
    desc: Run fork smoke test on gnosis
    cmds:
      - cmd: |
          FORK_HEALTHCHECK_CHAIN=gnosis forge test --match-contract ForkLifecycleHealthcheck -vvv
  smoke-test-base:
    desc: Run fork smoke test on base
    cmds:
      - cmd: |
          FORK_HEALTHCHECK_CHAIN=base forge test --match-contract ForkLifecycleHealthcheck -vvv
  smoke-test-celo:
    desc: Run fork smoke test on celo
    cmds:
      - cmd: |
          FORK_HEALTHCHECK_CHAIN=celo forge test --match-contract ForkLifecycleHealthcheck -vvv
  smoke-test-ethsep:
    desc: Run fork smoke test on ethsepolia
    cmds:
      - cmd: |
          FORK_HEALTHCHECK_CHAIN=ethsepolia forge test --match-contract ForkLifecycleHealthcheck -vvv
  smoke-test-arbsep:
    desc: Run fork smoke test on arbitrum sepolia
    cmds:
      - cmd: |
          FORK_HEALTHCHECK_CHAIN=arbsepolia forge test --match-contract ForkLifecycleHealthcheck -vvv
  smoke-test-opsep:
    desc: Run fork smoke test on optimism sepolia
    cmds:
      - cmd: |
          FORK_HEALTHCHECK_CHAIN=opsepolia forge test --match-contract ForkLifecycleHealthcheck -vvv
  rehearse-upgrade-chain:
    desc: Run upgrade script on a local Anvil fork for CHAIN, then smoke test the upgraded fork
    vars:
      CHAIN: ethsepolia
    deps:
      - verify-storage
    cmds:
      - cmd: |
          CHAIN="${CHAIN:-{{.CHAIN}}}"
          : "${PK_DEPLOYER_PW:?missing PK_DEPLOYER_PW}"

          case "${CHAIN}" in
            ethsepolia) RPC_ENV="RPC_URL_SEP_TESTNET"; CHAIN_ID=11155111 ;;
            arbsepolia) RPC_ENV="RPC_URL_ARB_TESTNET"; CHAIN_ID=421614 ;;
            opsepolia) RPC_ENV="RPC_URL_OP_TESTNET"; CHAIN_ID=11155420 ;;
            ethereum) RPC_ENV="RPC_URL_ETHEREUM"; CHAIN_ID=1 ;;
            arbitrum) RPC_ENV="RPC_URL_ARB"; CHAIN_ID=42161 ;;
            optimism) RPC_ENV="RPC_URL_OPT"; CHAIN_ID=10 ;;
            polygon) RPC_ENV="RPC_URL_POLYGON"; CHAIN_ID=137 ;;
            gnosis) RPC_ENV="RPC_URL_GNOSIS"; CHAIN_ID=100 ;;
            base) RPC_ENV="RPC_URL_BASE"; CHAIN_ID=8453 ;;
            celo) RPC_ENV="RPC_URL_CELO"; CHAIN_ID=42220 ;;
            *) echo "unsupported CHAIN: ${CHAIN}" >&2; exit 1 ;;
          esac

          eval "RPC_URL=\${${RPC_ENV}:-}"
          if [ -z "${RPC_URL}" ]; then
            echo "missing ${RPC_ENV}" >&2
            exit 1
          fi

          PORT="${ANVIL_PORT:-8545}"
          LOCAL_RPC_URL="http://127.0.0.1:${PORT}"
          DEPLOYER_ADDRESS="$(cast wallet address --account PK_DEPLOYER --password "${PK_DEPLOYER_PW}")"
          ROOT_DIR="$(git rev-parse --show-toplevel)"
          mkdir -p "${ROOT_DIR}/pkg/contracts/.tmp"
          TMP_NETWORKS_JSON="$(mktemp "${ROOT_DIR}/pkg/contracts/.tmp/gardens-networks-${CHAIN}-XXXXXX.json")"
          cp "${ROOT_DIR}/pkg/contracts/config/networks.json" "${TMP_NETWORKS_JSON}"
          trap 'rm -f "${TMP_NETWORKS_JSON}"' EXIT
          REFRESH_FACETS="${REFRESH_FACETS:-true}"
          RESUME_FLAG=""
          if [ "${RESUME:-false}" = "true" ]; then
            RESUME_FLAG="--resume"
          fi

          SIG="run(string)"
          case "${PHASE:-all}" in
            ""|all) ;;
            factory)
              case "${FACTORY_ACTION:-all}" in
                ""|all) SIG="runFactory(string)" ;;
                upgrade-impl|upgrade_impl) SIG="runFactoryUpgradeImpl(string)" ;;
                set-community-facets|set_community_facets) SIG="runFactorySetCommunityFacets(string)" ;;
                set-strategy-facets|set_strategy_facets) SIG="runFactorySetStrategyFacets(string)" ;;
                set-pause-controller|set_pause_controller) SIG="runFactorySetPauseController(string)" ;;
                set-registry-template|set_registry_template) SIG="runFactorySetRegistryTemplate(string)" ;;
                set-strategy-template|set_strategy_template) SIG="runFactorySetStrategyTemplate(string)" ;;
                *) echo "unsupported FACTORY_ACTION: ${FACTORY_ACTION}" >&2; exit 1 ;;
              esac
              ;;
            communities) SIG="runCommunities(string)" ;;
            strategies) SIG="runStrategies(string)" ;;
            *) echo "unsupported PHASE: ${PHASE}" >&2; exit 1 ;;
          esac

          anvil \
            --fork-url "${RPC_URL}" \
            --chain-id "${CHAIN_ID}" \
            --port "${PORT}" \
            > "/tmp/gardens-rehearse-${CHAIN}-anvil.log" 2>&1 &
          ANVIL_PID=$!

          for attempt in $(seq 1 30); do
            if cast block-number --rpc-url "${LOCAL_RPC_URL}" >/dev/null 2>&1; then
              break
            fi
            sleep 1
            if [ "${attempt}" -eq 30 ]; then
              echo "anvil fork did not start" >&2
              kill "${ANVIL_PID}" >/dev/null 2>&1 || true
              exit 1
            fi
          done

          cast rpc --rpc-url "${LOCAL_RPC_URL}" anvil_setBalance "${DEPLOYER_ADDRESS}" 0x3635C9ADC5DEA00000 >/dev/null || {
            kill "${ANVIL_PID}" >/dev/null 2>&1 || true
            exit 1
          }

          if [ "${REFRESH_FACETS}" = "true" ]; then
            NETWORKS_JSON_PATH="${TMP_NETWORKS_JSON}" ETH_PASSWORD= DEPLOYER_ADDRESS="${DEPLOYER_ADDRESS}" forge script script/RefreshFacetSnapshots.s.sol:RefreshFacetSnapshots \
              --rpc-url "${LOCAL_RPC_URL}" \
              --sig "run(string)" "${CHAIN}" \
              --account PK_DEPLOYER \
              --password "${PK_DEPLOYER_PW}" \
              --chain-id "${CHAIN_ID}" \
              --ffi \
              --broadcast \
              ${RESUME_FLAG} \
              -vv || {
              kill "${ANVIL_PID}" >/dev/null 2>&1 || true
              exit 1
            }
          fi

          NETWORKS_JSON_PATH="${TMP_NETWORKS_JSON}" ETH_PASSWORD= DEPLOYER_ADDRESS="${DEPLOYER_ADDRESS}" forge script script/UpgradeCVMultichain.s.sol:UpgradeCVMultichainScript \
            --rpc-url "${LOCAL_RPC_URL}" \
            --sig "${SIG}" "${CHAIN}" \
            --account PK_DEPLOYER \
            --password "${PK_DEPLOYER_PW}" \
            --chain-id "${CHAIN_ID}" \
            --ffi \
            --broadcast \
            ${RESUME_FLAG} \
            -vvv || {
            kill "${ANVIL_PID}" >/dev/null 2>&1 || true
            exit 1
          }

          FORK_HEALTHCHECK_CHAIN="${CHAIN}" FORK_HEALTHCHECK_RPC_URL="${LOCAL_RPC_URL}" forge test --match-contract ForkLifecycleHealthcheck -vvv || {
            kill "${ANVIL_PID}" >/dev/null 2>&1 || true
            exit 1
          }

          kill "${ANVIL_PID}" >/dev/null 2>&1 || true
  rehearse-upgrade-ethsep:
    desc: Rehearse upgrade on ethsepolia
    cmds:
      - cmd: CHAIN=ethsepolia task rehearse-upgrade-chain
  rehearse-upgrade-arbsep:
    desc: Rehearse upgrade on arbitrum sepolia
    cmds:
      - cmd: CHAIN=arbsepolia task rehearse-upgrade-chain
  rehearse-upgrade-opsep:
    desc: Rehearse upgrade on optimism sepolia
    cmds:
      - cmd: CHAIN=opsepolia task rehearse-upgrade-chain
  rehearse-upgrade-ethereum:
    desc: Rehearse upgrade on ethereum
    cmds:
      - cmd: CHAIN=ethereum task rehearse-upgrade-chain
  rehearse-upgrade-arbitrum:
    desc: Rehearse upgrade on arbitrum
    cmds:
      - cmd: CHAIN=arbitrum task rehearse-upgrade-chain
  rehearse-upgrade-optimism:
    desc: Rehearse upgrade on optimism
    cmds:
      - cmd: CHAIN=optimism task rehearse-upgrade-chain
  rehearse-upgrade-polygon:
    desc: Rehearse upgrade on polygon
    cmds:
      - cmd: CHAIN=polygon task rehearse-upgrade-chain
  rehearse-upgrade-gnosis:
    desc: Rehearse upgrade on gnosis
    cmds:
      - cmd: CHAIN=gnosis task rehearse-upgrade-chain
  rehearse-upgrade-base:
    desc: Rehearse upgrade on base
    cmds:
      - cmd: CHAIN=base task rehearse-upgrade-chain
  rehearse-upgrade-celo:
    desc: Rehearse upgrade on celo
    cmds:
      - cmd: CHAIN=celo task rehearse-upgrade-chain
  rehearse-upgrade-all-mainnets:
    desc: Rehearse upgrade on all mainnets (no testnets)
    cmds:
      - task: rehearse-upgrade-ethereum
      - task: rehearse-upgrade-arbitrum
      - task: rehearse-upgrade-optimism
      - task: rehearse-upgrade-polygon
      - task: rehearse-upgrade-gnosis
      - task: rehearse-upgrade-base
      - task: rehearse-upgrade-celo
  rehearse-safe-payload-chain:
    desc: Apply a Safe Transaction Builder payload on a local Anvil fork for CHAIN, then smoke test the fork
    vars:
      CHAIN: celo
    cmds:
      - cmd: |
          CHAIN="${CHAIN:-{{.CHAIN}}}" bash ./scripts/rehearse-safe-payload.sh "${CHAIN:-{{.CHAIN}}}"
  rehearse-safe-payload-ethereum:
    desc: Rehearse Safe payload on ethereum
    cmds:
      - cmd: CHAIN=ethereum task rehearse-safe-payload-chain
  rehearse-safe-payload-arbitrum:
    desc: Rehearse Safe payload on arbitrum
    cmds:
      - cmd: CHAIN=arbitrum task rehearse-safe-payload-chain
  rehearse-safe-payload-optimism:
    desc: Rehearse Safe payload on optimism
    cmds:
      - cmd: CHAIN=optimism task rehearse-safe-payload-chain
  rehearse-safe-payload-polygon:
    desc: Rehearse Safe payload on polygon
    cmds:
      - cmd: CHAIN=polygon task rehearse-safe-payload-chain
  rehearse-safe-payload-gnosis:
    desc: Rehearse Safe payload on gnosis
    cmds:
      - cmd: CHAIN=gnosis task rehearse-safe-payload-chain
  rehearse-safe-payload-base:
    desc: Rehearse Safe payload on base
    cmds:
      - cmd: CHAIN=base task rehearse-safe-payload-chain
  rehearse-safe-payload-celo:
    desc: Rehearse Safe payload on celo
    cmds:
      - cmd: CHAIN=celo task rehearse-safe-payload-chain
  rehearse-safe-payload-all-mainnets:
    desc: Rehearse Safe payloads on ethereum, arbitrum, optimism, polygon, gnosis, base, celo
    cmds:
      - task: rehearse-safe-payload-ethereum
      - task: rehearse-safe-payload-arbitrum
      - task: rehearse-safe-payload-optimism
      - task: rehearse-safe-payload-polygon
      - task: rehearse-safe-payload-gnosis
      - task: rehearse-safe-payload-base
      - task: rehearse-safe-payload-celo
  cast1:
    desc: Cast1
    cmds:
      - cmd: |
          cast send --account pk --rpc-url ${RPC_URL_LOCALHOST} \
          "0xfEcFbe13c84595Ba47464CD4d8d3bb359372Fc6f" "nonce()"
  deploy:
    desc: Deploy
    cmds:
      - cmd: |
          RESUME_FLAG=""
          if [ "${RESUME:-false}" = "true" ]; then
            RESUME_FLAG="--resume"
          fi
          forge script script/DeployCV.s.sol:DeployCV \
          --rpc-url ${RPC_URL_LOCALHOST} \
          --sender 0xf39fd6e51aad88f6f4ce6ab8827279cfffb92266 \
          --unlocked \
          --broadcast \
          ${RESUME_FLAG} \
          -vvvvv
      - task: sync-abis
  add-strategy-local:
    desc: Add strategy local
    cmds:
      - cmd: |
          RESUME_FLAG=""
          if [ "${RESUME:-false}" = "true" ]; then
            RESUME_FLAG="--resume"
          fi
          forge script script/AddStrategy.s.sol:AddStrategy \
          --rpc-url ${RPC_URL_LOCALHOST} \
          --sender 0xf39fd6e51aad88f6f4ce6ab8827279cfffb92266 \
          --unlocked \
          --sig "run(address,address)" ${S} ${C} \
          --broadcast \
          ${RESUME_FLAG} \
          -vvvv
  deploy-core-ethsep:
    desc: Deploy core contracts ethsepolia
    cmds:
      - cmd: |
          : "${PK_DEPLOYER_PW:?missing PK_DEPLOYER_PW}"
          DEPLOYER_ADDRESS="$(cast wallet address --account PK_DEPLOYER --password "${PK_DEPLOYER_PW}")"
          RESUME_FLAG=""
          if [ "${RESUME:-false}" = "true" ]; then
            RESUME_FLAG="--resume"
          fi
          ETH_PASSWORD= DEPLOYER_ADDRESS="${DEPLOYER_ADDRESS}" forge script script/DeployCoreContracts.s.sol:DeployCoreContracts \
          --rpc-url ${RPC_URL_SEP_TESTNET} \
          --account PK_DEPLOYER \
          --password "${PK_DEPLOYER_PW}" \
          --etherscan-api-key ${ETHERSCAN_API_KEY} \
          --sig "run(string)" 'ethsepolia' \
          --ffi \
          --broadcast \
          ${RESUME_FLAG} \
          --legacy \
          -vvv \
          --verify
      - task: sync-abis
  add-strategy-ethsep:
    desc: Add strategy ethsep
    cmds:
      - cmd: |
          : "${PK_DEPLOYER_PW:?missing PK_DEPLOYER_PW}"
          DEPLOYER_ADDRESS="$(cast wallet address --account PK_DEPLOYER --password "${PK_DEPLOYER_PW}")"
          RESUME_FLAG=""
          if [ "${RESUME:-false}" = "true" ]; then
            RESUME_FLAG="--resume"
          fi
          ETH_PASSWORD= DEPLOYER_ADDRESS="${DEPLOYER_ADDRESS}" forge script script/AddStrategy.s.sol:AddStrategy \
          --rpc-url ${RPC_URL_SEP_TESTNET} \
          --account PK_DEPLOYER \
          --password "${PK_DEPLOYER_PW}" \
          --sig "run(address,address)" ${S} ${C} \
          --broadcast \
          ${RESUME_FLAG} \
          --legacy \
          -vvvv
        ignore_error: true
  add-strategy-ethsep-pool:
    desc: Add strategy ethsep pool
    cmds:
      - cmd: |
          : "${PK_DEPLOYER_PW:?missing PK_DEPLOYER_PW}"
          DEPLOYER_ADDRESS="$(cast wallet address --account PK_DEPLOYER --password "${PK_DEPLOYER_PW}")"
          RESUME_FLAG=""
          if [ "${RESUME:-false}" = "true" ]; then
            RESUME_FLAG="--resume"
          fi
          ETH_PASSWORD= DEPLOYER_ADDRESS="${DEPLOYER_ADDRESS}" forge script script/AddStrategy.s.sol:AddStrategy \
          --rpc-url ${RPC_URL_SEP_TESTNET} \
          --account PK_DEPLOYER \
          --password "${PK_DEPLOYER_PW}" \
          --sig "run(uint256,address)" ${P} ${C} \
          --broadcast \
          ${RESUME_FLAG} \
          --legacy \
          -vvvv
        ignore_error: true
  upgrade-ethsep:
    desc: Upgrade ethsep
    deps:
      - verify-storage
    cmds:
      - task: sync-proxies
        vars:
          NETWORK: ethsepolia
      - task: refresh-facets-ethsep
      - cmd: |
          : "${PK_DEPLOYER_PW:?missing PK_DEPLOYER_PW}"
          DEPLOYER_ADDRESS="$(cast wallet address --account PK_DEPLOYER --password "${PK_DEPLOYER_PW}")"
          RESUME_FLAG=""
          if [ "${RESUME:-false}" = "true" ]; then
            RESUME_FLAG="--resume"
          fi
          SIG="run(string)"
          case "${PHASE:-all}" in
            ""|all) ;;
            factory)
              case "${FACTORY_ACTION:-all}" in
                ""|all) SIG="runFactory(string)" ;;
                upgrade-impl|upgrade_impl) SIG="runFactoryUpgradeImpl(string)" ;;
                set-community-facets|set_community_facets) SIG="runFactorySetCommunityFacets(string)" ;;
                set-strategy-facets|set_strategy_facets) SIG="runFactorySetStrategyFacets(string)" ;;
                set-pause-controller|set_pause_controller) SIG="runFactorySetPauseController(string)" ;;
                set-registry-template|set_registry_template) SIG="runFactorySetRegistryTemplate(string)" ;;
                set-strategy-template|set_strategy_template) SIG="runFactorySetStrategyTemplate(string)" ;;
                *) echo "unsupported FACTORY_ACTION: ${FACTORY_ACTION}" >&2; exit 1 ;;
              esac
              ;;
            communities) SIG="runCommunities(string)" ;;
